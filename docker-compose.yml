services:
  db:
    image: mongo:7
    container_name: liubai-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-liubai}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  runtime:
    image: ${LIUBAI_RUNTIME_IMAGE:-${GHCR_MIRROR:-ghcr.io}/xiaoheicat/liubai-runtime:latest}
    pull_policy: missing
    container_name: liubai-runtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${RUNTIME_PORT:-9000}:9000"
    environment:
      MONGODB_URI: mongodb://db:27017/${MONGODB_DB:-liubai}
      MONGODB_DB: ${MONGODB_DB:-liubai}
      RUNTIME_PORT: "9000"
      RUNTIME_HOST: 0.0.0.0
      APPID: ${APPID:-liubai}
      LIU_TRIGGER_TOKEN: ${LIU_TRIGGER_TOKEN:-change-me}
      LIU_FFMPEG_BASEURL: http://ffmpeg:3000
      LIU_APP_NAME: ${LIU_APP_NAME:-Liubai}
      LIU_CLOUD_ON: ${LIU_CLOUD_ON:-01}
      LIU_CLOUD_LOGIN: ${LIU_CLOUD_LOGIN:-01}
      LIU_DOMAIN: ${LIU_DOMAIN:-}
      LIU_DEBUG_KEY: ${LIU_DEBUG_KEY:-}
      LIU_WEB_PUSH_PROXY_HOST: ${LIU_WEB_PUSH_PROXY_HOST:-}
      LIU_GITHUB_OAUTH_CLIENT_ID: ${LIU_GITHUB_OAUTH_CLIENT_ID:-}
      LIU_GITHUB_OAUTH_CLIENT_SECRET: ${LIU_GITHUB_OAUTH_CLIENT_SECRET:-}
      LIU_GOOGLE_OAUTH_CLIENT_ID: ${LIU_GOOGLE_OAUTH_CLIENT_ID:-}
      LIU_GOOGLE_OAUTH_CLIENT_SECRET: ${LIU_GOOGLE_OAUTH_CLIENT_SECRET:-}
      LIU_RESEND_API_KEY: ${LIU_RESEND_API_KEY:-}
      LIU_RESEND_FROM_EMAIL: ${LIU_RESEND_FROM_EMAIL:-}
      LIU_STRIPE_API_KEY: ${LIU_STRIPE_API_KEY:-}
      LIU_STRIPE_ENDPOINT_SECRET: ${LIU_STRIPE_ENDPOINT_SECRET:-}
      LIU_STRIPE_TEST_PRICE_ID: ${LIU_STRIPE_TEST_PRICE_ID:-}
      LIU_QINIU_ACCESS_KEY: ${LIU_QINIU_ACCESS_KEY:-}
      LIU_QINIU_SECRET_KEY: ${LIU_QINIU_SECRET_KEY:-}
      LIU_QINIU_BUCKET: ${LIU_QINIU_BUCKET:-}
      LIU_QINIU_CALLBACK_URL: ${LIU_QINIU_CALLBACK_URL:-}
      LIU_QINIU_CDN_DOMAIN: ${LIU_QINIU_CDN_DOMAIN:-}
      LIU_QINIU_CUSTOM_KEY: ${LIU_QINIU_CUSTOM_KEY:-}
      LIU_MINIO_ENDPOINT: ${LIU_MINIO_ENDPOINT:-http://minio:9000}
      LIU_MINIO_PUBLIC_URL: ${LIU_MINIO_PUBLIC_URL:-http://localhost:19000}
      LIU_MINIO_ACCESS_KEY: ${LIU_MINIO_ACCESS_KEY:-minioadmin}
      LIU_MINIO_SECRET_KEY: ${LIU_MINIO_SECRET_KEY:-minioadmin}
      LIU_MINIO_BUCKET: ${LIU_MINIO_BUCKET:-liubai}
      LIU_MINIO_REGION: ${LIU_MINIO_REGION:-us-east-1}
      LIU_DISABLE_CRON: ${LIU_DISABLE_CRON:-}

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: liubai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LIU_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${LIU_MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:latest}
    container_name: liubai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio/cors.json:/tmp/cors.json:ro
    environment:
      MINIO_ROOT_USER: ${LIU_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${LIU_MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${LIU_MINIO_BUCKET:-liubai}
    entrypoint: >
      /bin/sh -c "
      mc alias set liubai http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb liubai/$$MINIO_BUCKET --ignore-existing &&
      mc anonymous set download liubai/$$MINIO_BUCKET &&
      mc cors set /tmp/cors.json liubai/$$MINIO_BUCKET &&
      exit 0
      "

  ffmpeg:
    image: ${LIUBAI_FFMPEG_IMAGE:-${GHCR_MIRROR:-ghcr.io}/xiaoheicat/liubai-ffmpeg:latest}
    pull_policy: missing
    container_name: liubai-ffmpeg
    restart: unless-stopped
    expose:
      - "3000"

  web:
    profiles:
      - with-web
    image: ${LIUBAI_WEB_IMAGE:-${GHCR_MIRROR:-ghcr.io}/xiaoheicat/liubai-web:latest}
    pull_policy: missing
    container_name: liubai-web
    restart: unless-stopped
    depends_on:
      - runtime
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  mongo_data:
  minio_data:
