name: Publish Docker Images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-publish.yml"
      - "docker/**"
      - "docker-compose.yml"
      - "liubai-backends/liubai-ffmpeg/**"
      - "liubai-backends/liubai-laf/**"
      - "liubai-backends/liubai-runtime/**"
      - "liubai-frontends/liubai-web/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: liubai-runtime
            dockerfile: liubai-backends/liubai-runtime/Dockerfile
          - image: liubai-ffmpeg
            dockerfile: liubai-backends/liubai-ffmpeg/Dockerfile
          - image: liubai-web
            dockerfile: docker/liubai-web/Dockerfile
            build-args: VITE_API_DOMAIN=

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image owner (lowercase)
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
